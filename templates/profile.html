<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chefbot - Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/style1_1.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .profile-container {
            max-width: 600px;
            margin: 120px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .profile-container h2 {
            margin-bottom: 30px;
        }

        .profile-info {
            font-size: 18px;
            margin: 15px 0;
        }

        .back-btn {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            background: #2e7d6d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #0b4d3b;
        }
    </style>
</head>

<body>

<div class="profile-container">

    <h2><i class="fas fa-user-circle"></i> User Profile</h2>

    <div class="profile-info">
        <strong>Name:</strong> {{ user_name }}
    </div>

    <div class="profile-info">
        <strong>Email:</strong> {{ user_email }}
    </div>

    <div class="profile-info">
        <strong>Member Since:</strong> 2026
    </div>

    <a href="{{ url_for('home') }}" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

</div>

</body>
</html>
